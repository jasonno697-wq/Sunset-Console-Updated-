<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunset Console - HTML Download</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #2b1f52 0%, #141128 45%, #0a0a12 100%);
        color: #f8fafc;
      }

      .card {
        width: min(640px, 92vw);
        padding: 2rem;
        border-radius: 1.25rem;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 1.5rem;
        color: #cbd5e1;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .btn {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-weight: 700;
        border: 1px solid transparent;
      }

      .btn-primary {
        background: linear-gradient(135deg, #fb7185, #f97316);
        color: #0f172a;
      }

      .btn-secondary {
        border-color: rgba(148, 163, 184, 0.3);
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sunset Console HTML Export</h1>
      <p>
        Use this page to download the latest full system manifest as an HTML file.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/public/publicdownload.html" download="sunset-master-system.html">
          Download <code>sunset-master-system.html</code>
        </a>
        <a class="btn btn-secondary" href="/public.html" target="_blank" rel="noopener noreferrer">
          Preview Manifest
        </a>
      </div>
    </main>
  </body>
</html>
