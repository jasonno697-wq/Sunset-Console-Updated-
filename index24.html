<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Console - System Access index24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-pulse-slow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="matrix-bg" id="matrix"></div>
    
    <div class="glass p-12 rounded-[2.5rem] max-w-lg w-full text-center space-y-8 border-orange-500/30 shadow-2xl relative">
        <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-orange-500 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(249,115,22,0.5)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"/><path d="m4.93 4.93 1.41 1.41"/><path d="M2 12h8"/><path d="m4.93 19.07 1.41-1.41"/><path d="M12 22v-8"/><path d="m19.07 19.07-1.41-1.41"/><path d="M22 12h-8"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </div>
        
        <div class="pt-8">
            <h1 class="text-4xl font-bold text-white tracking-tighter mb-2">SUNSET CONSOLE</h1>
            <p class="text-orange-500 font-bold uppercase tracking-[0.3em] text-[10px]">System Access index24 • ChatGPT Codex</p>
        </div>

        <div class="space-y-4">
            <div class="p-4 bg-black/40 rounded-2xl border border-white/5 text-left">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] text-white/40 uppercase">Kernel Status</span>
                    <span class="text-emerald-400 text-[10px] font-bold">ACTIVE</span>
                </div>
                <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                    <div class="bg-emerald-500 h-full w-[85%]"></div>
                </div>
            </div>
            
            <div class="p-4 bg-black/40 rounded-2xl border border-white/5 text-left">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] text-white/40 uppercase">Protection</span>
                    <span class="text-orange-400 text-[10px] font-bold">KERNEL SHIELD</span>
                </div>
                <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                    <div class="bg-orange-500 h-full w-[100%]"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <a href="/" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-2xl transition-all shadow-lg shadow-orange-500/20 uppercase tracking-widest text-sm">
                Enter Console
            </a>
            <a href="/public/publicdownload.html" class="w-full py-4 bg-white/5 hover:bg-white/10 text-white/60 font-bold rounded-2xl transition-all border border-white/10 uppercase tracking-widest text-sm">
                Download System
            </a>
        </div>

        <p class="text-[10px] text-white/20 uppercase font-bold tracking-widest">
            Authorized Personnel Only • v2.5.24
        </p>
    </div>

    <script>
        const matrix = document.getElementById('matrix');
        const chars = '0123456789ABCDEF';
        const rows = 50;
        const cols = 100;
        
        for(let i = 0; i < rows; i++) {
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.justifyContent = 'space-between';
            for(let j = 0; j < cols; j++) {
                const span = document.createElement('span');
                span.innerText = chars[Math.floor(Math.random() * chars.length)];
                span.style.fontSize = '10px';
                span.style.margin = '2px';
                row.appendChild(span);
            }
            matrix.appendChild(row);
        }
        
        setInterval(() => {
            const spans = matrix.getElementsByTagName('span');
            const randomIdx = Math.floor(Math.random() * spans.length);
            spans[randomIdx].innerText = chars[Math.floor(Math.random() * chars.length)];
            spans[randomIdx].style.color = '#f97316';
            setTimeout(() => {
                spans[randomIdx].style.color = '';
            }, 500);
        }, 50);
    </script>
</body>
</html>
